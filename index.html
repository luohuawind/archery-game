<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <script type='text/javascript'>
        function ResizeGameScreen() {
            if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                return;
            }
            var unityInstance = window.unityInstance;
            if(unityInstance == null){
                return;
            }
            var ratio = window.devicePixelRatio;
            var designW = 720;
            var designH = 1280;

            document.body.style.zoom = 1 / window.devicePixelRatio;
            var canvas = document.getElementById("unity-canvas");
            var w = document.documentElement.clientWidth;//获取body可见区域宽度
            var h = document.documentElement.clientHeight;//获取body可见区域高度

            var scale = 720 / 1280;

            var fixedWidth = designW;
            var fixedHeight = designH;
            if (w / h > scale) {
                fixedWidth = h * scale;
                fixedHeight = h;
            }
            if (w / h < scale) {
                fixedWidth = w;
                fixedHeight = w / scale;
            }

            if (window.devicePixelRatio <= 1.05) {
                canvas.width = fixedWidth;
                canvas.height = fixedHeight;
            } else {
                canvas.width = fixedWidth * window.devicePixelRatio;
                canvas.height = fixedHeight * window.devicePixelRatio;
            }
            canvas.width = fixedWidth * window.devicePixelRatio;
            canvas.height = fixedHeight * window.devicePixelRatio;
            unityInstance.SendMessage('WebGLResolution', 'SetResolution', document.documentElement.clientWidth + "_" + document.documentElement.clientHeight + "_" + ratio);
        }
    </script>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>箭箭惊心</title>
</head>
<body onload="ResizeGameScreen()" onresize="ResizeGameScreen()" style="text-align: center;margin: 0;overflow: hidden">
<div id="canvas-container">
    <canvas width="720" height="1280" id="unity-canvas" style="background: #1F1F20;" tabindex="-1"></canvas>
</div>
<script src="Build/WebGL.loader.js"></script>
<script>
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";

        document.body.style.textAlign = "left";
    }

    createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/WebGL.data",
        frameworkUrl: "Build/WebGL.framework.js",
        codeUrl: "Build/WebGL.wasm",
        symbolsUrl: "Build/WebGL.symbols.json",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "ZaiZhan",
        productName: "箭箭惊心",
        productVersion: "1.0",
        // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
        // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
    }).then((unityInstance) => {
        window.unityInstance = unityInstance;
        ResizeGameScreen();
    });
</script>
</body>
</html>
